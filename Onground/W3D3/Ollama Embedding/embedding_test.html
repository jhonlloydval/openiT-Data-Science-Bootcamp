<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ollama Embedding Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        textarea {
            width: 100%;
            height: 100px;
            margin-bottom: 10px;
        }
        button {
            padding: 10px 20px;
            cursor: pointer;
        }
        #result {
            margin-top: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 5px;
            word-break: break-all;
            max-height: 300px;
            overflow-y: auto;
        }
        #status {
            margin-top: 10px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <h1>Ollama Embedding Test</h1>
    
    <label for="model">Model:</label>
    <input type="text" id="model" value="nomic-embed-text" style="width: 200px; margin-bottom: 10px;">
    
    <br>
    <label for="text">Text to embed:</label>
    <textarea id="text" placeholder="Enter text to get embeddings...">Hello, world!</textarea>
    
    <button onclick="getEmbedding()">Get Embedding</button>
    
    <div id="status"></div>
    <div id="result"></div>

    <script>
        async function getEmbedding() {
            const model = document.getElementById('model').value;
            const text = document.getElementById('text').value;
            const statusEl = document.getElementById('status');
            const resultEl = document.getElementById('result');
            
            statusEl.textContent = 'Fetching embedding...';
            resultEl.textContent = '';
            
            try {
                const response = await fetch('http://localhost:11434/api/embeddings', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: model,
                        prompt: text
                    })
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                
                statusEl.textContent = `Success! Embedding dimensions: ${data.embedding?.length || 'N/A'}`;
                resultEl.textContent = JSON.stringify(data, null, 2);
                
            } catch (error) {
                statusEl.textContent = 'Error: ' + error.message;
                resultEl.textContent = 'Make sure Ollama is running locally on port 11434';
            }
        }
    </script>
</body>
</html>
